#!/usr/bin/env bash
# vim:fileencoding=utf-8:ft=bash:foldmethod=marker

# GENERAL {{{
set-option -g prefix C-a
set-option -g base-index 1
set-window-option -g pane-base-index 1
set-option -sa terminal-overrides ",xterm*:Tc"
set-option -g allow-passthrough on # useful for displaying images on tmux
set -g extended-keys on
set -g extended-keys-format csi-u
set-option -sg escape-time 10
set -g mouse on
set-option -g status-position bottom
set -g pane-border-style 'fg=colour238,bg=default'
set -g pane-active-border-style 'fg=#ff9e64,bg=default'
set -g pane-border-lines heavy
set -g pane-border-indicators arrows
set -g window-style 'fg=colour245'
set -g window-active-style 'fg=terminal'
# }}}

# KEYBINDINGS {{{
# Vi mode & copy
set-window-option -g mode-keys vi
bind-key y copy-mode
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection
unbind -T copy-mode-vi MouseDragEnd1Pane
bind -Tcopy-mode WheelUpPane send -N1 -X scroll-up
bind -Tcopy-mode WheelDownPane send -N1 -X scroll-down
# Navigation
bind -n S-Left  previous-window
bind -n S-Right next-window
bind -n C-S-Left switch-client -p
bind -n C-S-Right switch-client -n
# Windows & panes
bind s split-window -c "#{pane_current_path}"
bind c-s split-window -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind c-v split-window -h -c "#{pane_current_path}"
bind c-c new-window -c "#{pane_current_path}"
bind-key C-Space display-popup -E 'tx'
# Resize: prefix + r to enter resize mode, then 0-9 for sizes
bind - resize-pane -D 5 \; resize-pane -R 5
bind + resize-pane -U 5 \; resize-pane -L 5
bind r switch-client -T resize
bind -T resize 1 resize-pane -t "{left-of}" -x "10%" -y "10%"
bind -T resize 2 resize-pane -t "{left-of}" -x "20%" -y "20%"
bind -T resize 3 resize-pane -t "{left-of}" -x "30%" -y "30%"
bind -T resize 4 resize-pane -t "{left-of}" -x "40%" -y "40%"
bind -T resize 5 resize-pane -t "{left-of}" -x "50%" -y "50%"
bind -T resize 6 resize-pane -t "{left-of}" -x "60%" -y "60%"
bind -T resize 7 resize-pane -t "{left-of}" -x "70%" -y "70%"
bind -T resize 8 resize-pane -t "{left-of}" -x "80%" -y "80%"
bind -T resize 9 resize-pane -t "{left-of}" -x "90%" -y "90%"
bind -T resize 0 resize-pane -t "{left-of}" -x "100%" -y "100%"
# }}}

# PLUGINS {{{
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
# set -g @plugin 'tmux-plugins/tmux-yank'
# }}}

# SESSION DOTS {{{
set -g @plugin 'jtmcginty/tmux-session-dots'
set -g @session-dots-active "▪︎"
set -g @session-dots-inactive "▫︎"
# }}}

